# AlleleFlux Example Configuration
# =================================
# This configuration works with the synthetic example dataset bundled in this
# directory. All paths are relative to this file's directory.
#
# To run:
#   cd docs/source/examples/example_data
#   alleleflux run --config config_example.yml --threads 4
#
# Or from any directory using --working-dir:
#   alleleflux run --config /path/to/config_example.yml \
#     --working-dir /path/to/example_data --threads 4

run_name: "example_analysis"

# Input Files
# -----------
# Paths are relative to the working directory (the example_data/ folder).
input:
  fasta_path: "reference/combined_mags.fasta"
  prodigal_path: "reference/prodigal_genes.fna"
  metadata_path: "metadata/sample_metadata.tsv"
  gtdb_path: "reference/gtdbtk_taxonomy.tsv"
  mag_mapping_path: "reference/mag_mapping.tsv"
  # Pre-generated profiles are provided — the profiling step is skipped.
  profiles_path: "profiles"

# Output Directory
# ----------------
output:
  root_dir: "./example_output"

log_level: "INFO"

# Analysis Configuration
# ----------------------
analysis:
  data_type: "longitudinal"       # This example uses longitudinal (pre/post) data
  allele_analysis_only: False

  # Test types — LMM and CMH disabled for speed on a desktop (2 subjects/group)
  use_lmm: False
  use_significance_tests: True    # Paired t-test and Mann-Whitney tests
  use_cmh: False
  use_regional_contrast: False     # Gene/window-level contrast scores
  use_gene_scores: False          # Gene-level scores (requires Prodigal annotations)
  use_outlier_detection: False    # Outlier detection (requires use_gene_scores: True)

  # Taxonomy levels for aggregated scores
  taxa_score_levels:
    - phylum
    - genus

  # Timepoints and groups
  timepoints_combinations:
    - timepoint: ["pre", "post"]
      focus: "post"

  groups_combinations:
    - ["treatment", "control"]

# Quality Control Parameters
# --------------------------
quality_control:
  min_sample_num: 2               # Lowered for small example dataset (2 subjects/group)
  breadth_threshold: 0.1
  coverage_threshold: 1
  disable_zero_diff_filtering: False

# Profiling Parameters
# --------------------
# Not used for this example (profiles are pre-generated), but kept for reference.
profiling:
  ignore_orphans: True
  min_base_quality: 30
  min_mapping_quality: 2
  ignore_overlaps: True

# Statistical Parameters
# ----------------------
statistics:
  filter_type: "t-test"
  preprocess_between_groups: True
  preprocess_within_groups: True
  max_zero_count: 2               # Lowered for small example dataset
  p_value_threshold: 0.05
  fdr_group_by_mag_id: False
  min_positions_after_preprocess: 1

# dN/dS Analysis Parameters
# -------------------------
dnds:
  p_value_column: "q_value"
  dn_ds_test_type: "two_sample_paired_tTest"

# Regional Contrast Parameters
# ----------------------------
regional_contrast:
  mode: "both"                    # Detect signals at both gene and window level
  window_size: 500                # Tile width in bp (smaller for demo dataset)
  agg_method: "median"
  min_informative_sites: 2        # Lowered for small example dataset
  min_informative_fraction: 0.0
  use_fisher: True

# Compute Resources
# -----------------
# Conservative settings for local/desktop execution
resources:
  threads_per_job: 4
  mem_per_job: "4G"
  time: "01:00:00"
  retries: 1
  mem_step: "2G"
  time_step: "0:30:00"
