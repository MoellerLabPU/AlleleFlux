# AlleleFlux Example Configuration — BAM-based (includes profiling step)
# ========================================================================
# This configuration runs the full pipeline starting from BAM files.
# The profiling step is NOT skipped — AlleleFlux generates profiles from the
# bundled BAMs before running all downstream analysis.
#
# To run:
#   cd docs/source/examples/example_data
#   alleleflux run --config config_with_bams.yml --threads 4
#
# Expected runtime: ~2 minutes on a 4-core desktop
# (profiling adds ~10 s over the pre-profiled config_example.yml)
#
# To regenerate the BAM files from scratch:
#   bash generate_bams.sh

run_name: "example_analysis_bams"

# Input Files
# -----------
# Paths are relative to the working directory (the example_data/ folder).
input:
  fasta_path: "reference/combined_mags.fasta"
  prodigal_path: "reference/prodigal_genes.fna"
  metadata_path: "metadata/sample_metadata_bams.tsv"
  gtdb_path: "reference/gtdbtk_taxonomy.tsv"
  mag_mapping_path: "reference/mag_mapping.tsv"
  # profiles_path is intentionally absent — AlleleFlux will run the profiling step.

# Output Directory
# ----------------
output:
  root_dir: "./example_output_bams"

log_level: "INFO"

# Analysis Configuration
# ----------------------
analysis:
  data_type: "longitudinal"
  allele_analysis_only: False

  use_lmm: False
  use_significance_tests: True
  use_cmh: False
  use_regional_contrast: True
  use_gene_scores: False
  use_outlier_detection: False

  taxa_score_levels:
    - phylum
    - genus

  timepoints_combinations:
    - timepoint: ["pre", "post"]
      focus: "post"

  groups_combinations:
    - ["treatment", "control"]

# Quality Control Parameters
# --------------------------
quality_control:
  min_sample_num: 2
  breadth_threshold: 0.1
  coverage_threshold: 1
  disable_zero_diff_filtering: False

# Profiling Parameters
# --------------------
profiling:
  ignore_orphans: True
  min_base_quality: 0    # wgsim assigns Phred ~23; disable base-quality filter for synthetic data
  min_mapping_quality: 2
  ignore_overlaps: True

# Statistical Parameters
# ----------------------
statistics:
  filter_type: "t-test"
  preprocess_between_groups: True
  preprocess_within_groups: True
  max_zero_count: 2
  p_value_threshold: 0.05
  fdr_group_by_mag_id: False
  min_positions_after_preprocess: 1

# dN/dS Analysis Parameters
# -------------------------
dnds:
  p_value_column: "q_value"
  dn_ds_test_type: "two_sample_paired_tTest"

# Regional Contrast Parameters
# ----------------------------
regional_contrast:
  mode: "both"
  window_size: 500
  agg_method: "median"
  min_informative_sites: 2
  min_informative_fraction: 0.0
  use_fisher: True

# Compute Resources
# -----------------
resources:
  threads_per_job: 4
  mem_per_job: "4G"
  time: "01:00:00"
  retries: 1
  mem_step: "2G"
  time_step: "0:30:00"
