name: alleleflux
channels:
  - conda-forge
  - bioconda
  - nodefaults # Do not use any other channel
dependencies:
  - python
  - numpy
  - pandas
  - pyarrow
  - scipy
  - matplotlib-base
  - statsmodels
  - seaborn
  - tqdm
  - pysam
  - samtools
  - biopython
  - intervaltree
  - snakemake>=8.0.0
  - snakemake-executor-plugin-cluster-generic
  - rpy2 # Added for R integration
  - r-base # Required by rpy2
  - r-tidyr
  - pip
  - pip:
      - -e .
